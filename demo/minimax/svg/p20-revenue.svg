<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340">
  <style>text{font-family:'Noto Sans SC','Noto Serif SC',sans-serif}</style>
  <rect width="500" height="340" fill="none"/>
  <text x="250" y="22" font-size="13" font-weight="700" fill="#1a2e1f" text-anchor="middle">三年收入与利润（万元）</text>
  <!-- Y1 -->
  <rect x="50" y="65" width="60" height="88" rx="3" fill="rgba(42,157,143,0.5)"/>
  <rect x="130" y="101" width="60" height="52" rx="3" fill="rgba(216,90,48,0.35)"/>
  <line x1="50" y1="100" x2="50" y2="100" stroke="#D85A30" stroke-width="2"/>
  <text x="80" y="55" font-size="9" fill="#1a2e1f" opacity="0.6" text-anchor="middle">第1年</text>
  <text x="80" y="165" font-size="9" fill="#2A9D8F" font-weight="600" text-anchor="middle">43.2</text>
  <text x="160" y="165" font-size="9" fill="#D85A30" text-anchor="middle">33.7</text>
  <text x="80" y="180" font-size="7" fill="#D85A30" text-anchor="middle">净 -15.5</text>

  <!-- Y2 -->
  <rect x="200" y="55" width="60" height="98" rx="3" fill="rgba(55,138,221,0.45)"/>
  <rect x="280" y="88" width="60" height="65" rx="3" fill="rgba(216,90,48,0.25)"/>
  <text x="230" y="45" font-size="9" fill="#1a2e1f" opacity="0.6" text-anchor="middle">第2年</text>
  <text x="230" y="165" font-size="9" fill="#378ADD" text-anchor="middle">50.8</text>
  <text x="310" y="165" font-size="9" fill="#D85A30" opacity="0.8" text-anchor="middle">—</text>
  <text x="230" y="180" font-size="7" fill="#D85A30" text-anchor="middle">净 -7.5</text>

  <!-- Y3 -->
  <rect x="350" y="35" width="60" height="118" rx="3" fill="rgba(42,110,59,0.55)"/>
  <rect x="350" y="35" width="60" height="118" rx="3" fill="#2a6e3b" opacity="0.6"/>
  <text x="380" y="25" font-size="9" fill="#1a2e1f" opacity="0.6" text-anchor="middle">第3年</text>
  <text x="380" y="165" font-size="9" fill="#2a6e3b" font-weight="700" text-anchor="middle">54.9</text>
  <text x="380" y="180" font-size="7" fill="#2a6e3b" font-weight="600" text-anchor="middle">净 +1.2 ✓</text>

  <!-- Legend -->
  <rect x="50" y="210" width="10" height="10" rx="2" fill="rgba(42,157,143,0.5)"/>
  <text x="65" y="218" font-size="9" fill="#1a2e1f" opacity="0.55">收入</text>
  <rect x="120" y="210" width="10" height="10" rx="2" fill="rgba(216,90,48,0.35)"/>
  <text x="135" y="218" font-size="9" fill="#1a2e1f" opacity="0.55">运营成本</text>
  <text x="250" y="218" font-size="9" fill="#1a2e1f" opacity="0.35">折旧 25 万/年（固定）</text>
</svg>
