<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <style>text{font-family:'Noto Sans SC','Noto Serif SC',sans-serif}</style>
  <rect width="520" height="320" fill="none"/>
  <text x="260" y="22" font-size="12" font-weight="700" fill="#1a2e1f" text-anchor="middle">关键经营指标</text>
  <!-- Row 1 -->
  <rect x="14" y="36" width="156" height="106" rx="6" fill="rgba(42,157,143,0.04)" stroke="rgba(42,157,143,0.2)" stroke-width="1"/>
  <text x="92" y="58" font-size="8" fill="#1a2e1f" opacity="0.35" text-anchor="middle" font-family="'IBM Plex Mono',monospace">总投资</text>
  <text x="92" y="90" font-size="26" font-weight="700" fill="#2A9D8F" text-anchor="middle">250 万</text>
  <text x="92" y="110" font-size="8" fill="#1a2e1f" opacity="0.4" text-anchor="middle">方案 A 中值</text>
  <text x="92" y="126" font-size="7" fill="#1a2e1f" opacity="0.3" text-anchor="middle">每间投资 50 万</text>

  <rect x="182" y="36" width="156" height="106" rx="6" fill="rgba(55,138,221,0.04)" stroke="rgba(55,138,221,0.18)" stroke-width="1"/>
  <text x="260" y="58" font-size="8" fill="#1a2e1f" opacity="0.35" text-anchor="middle" font-family="'IBM Plex Mono',monospace">年收入（首年）</text>
  <text x="260" y="90" font-size="26" font-weight="700" fill="#378ADD" text-anchor="middle">43.2 万</text>
  <text x="260" y="110" font-size="8" fill="#1a2e1f" opacity="0.4" text-anchor="middle">旺季入住率 60%</text>
  <text x="260" y="126" font-size="7" fill="#1a2e1f" opacity="0.3" text-anchor="middle">年均房价 950 元</text>

  <rect x="350" y="36" width="156" height="106" rx="6" fill="rgba(216,90,48,0.04)" stroke="rgba(216,90,48,0.15)" stroke-width="1"/>
  <text x="428" y="58" font-size="8" fill="#1a2e1f" opacity="0.35" text-anchor="middle" font-family="'IBM Plex Mono',monospace">首年净利润</text>
  <text x="428" y="90" font-size="26" font-weight="700" fill="#D85A30" text-anchor="middle">-15.5 万</text>
  <text x="428" y="110" font-size="8" fill="#1a2e1f" opacity="0.4" text-anchor="middle">正常爬坡期</text>
  <text x="428" y="126" font-size="7" fill="#1a2e1f" opacity="0.3" text-anchor="middle">第 3 年扭亏</text>

  <!-- Row 2 -->
  <rect x="14" y="156" width="156" height="90" rx="6" fill="rgba(42,110,59,0.04)" stroke="rgba(42,110,59,0.18)" stroke-width="1"/>
  <text x="92" y="178" font-size="8" fill="#1a2e1f" opacity="0.35" text-anchor="middle" font-family="'IBM Plex Mono',monospace">净利润率</text>
  <text x="92" y="208" font-size="22" font-weight="700" fill="#1a2e1f" text-anchor="middle">-36%</text>

  <rect x="182" y="156" width="156" height="90" rx="6" fill="rgba(42,110,59,0.04)" stroke="rgba(42,110,59,0.18)" stroke-width="1"/>
  <text x="260" y="178" font-size="8" fill="#1a2e1f" opacity="0.35" text-anchor="middle" font-family="'IBM Plex Mono',monospace">保本入住率</text>
  <text x="260" y="208" font-size="22" font-weight="700" fill="#1a2e1f" text-anchor="middle">65.5%</text>

  <rect x="350" y="156" width="156" height="90" rx="6" fill="rgba(42,110,59,0.05)" stroke="rgba(42,110,59,0.22)" stroke-width="1"/>
  <text x="428" y="178" font-size="8" fill="#1a2e1f" opacity="0.35" text-anchor="middle" font-family="'IBM Plex Mono',monospace">投资回收期</text>
  <text x="428" y="208" font-size="22" font-weight="700" fill="#1a2e1f" text-anchor="middle">7-8 年</text>

  <!-- Note -->
  <rect x="14" y="260" width="492" height="30" rx="4" fill="rgba(42,110,59,0.04)" stroke="rgba(42,110,59,0.1)" stroke-width="0.5"/>
  <text x="260" y="280" font-size="9" fill="#1a2e1f" opacity="0.45" text-anchor="middle">首年亏损属正常爬坡 · 第三年可扭亏为盈 · 财务模型参考方案 A</text>
</svg>
