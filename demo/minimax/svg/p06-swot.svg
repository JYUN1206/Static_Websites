  <text x="24" y="144" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 政策资源三重叠加</text>
  <text x="24" y="168" font-size="8" fill="#2A9D8F" opacity="0.5">内部有利因素</text>
  <!-- W -->
  <rect x="266" y="38" width="240" height="166" rx="6" fill="rgba(216,90,48,0.04)" stroke="rgba(216,90,48,0.2)" stroke-width="1"/>
  <path d="M266 44 Q266 38 272 38 L382 38 L382 54 L266 54 Z" fill="rgba(216,90,48,0.08)"/>
  <text x="386" y="50" font-size="11" font-weight="700" fill="#D85A30" text-anchor="middle">W 劣势</text>
  <text x="276" y="72" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 住宿品质不足</text>
