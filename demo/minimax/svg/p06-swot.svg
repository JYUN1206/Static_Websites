<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400">
  <style>text{font-family:'Noto Sans SC','Noto Serif SC',sans-serif}</style>
  <rect width="520" height="400" fill="none"/>
  <text x="260" y="24" font-size="13" font-weight="700" fill="#1a2e1f" text-anchor="middle">SWOT 分析矩阵</text>
  <!-- Grid lines -->
  <line x1="260" y1="35" x2="260" y2="390" stroke="rgba(26,46,31,0.08)" stroke-width="1"/>
  <line x1="10" y1="210" x2="510" y2="210" stroke="rgba(26,46,31,0.08)" stroke-width="1"/>
  <!-- S -->
  <rect x="14" y="38" width="240" height="166" rx="6" fill="rgba(42,157,143,0.06)" stroke="rgba(42,157,143,0.25)" stroke-width="1"/>
  <path d="M14 44 Q14 38 20 38 L130 38 L130 54 L130 54 L14 54 Z" fill="rgba(42,157,143,0.12)"/>
  <text x="130" y="50" font-size="11" font-weight="700" fill="#2A9D8F" text-anchor="middle">S 优势</text>
  <text x="24" y="72" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 悬崖苗寨地貌独家</text>
  <text x="24" y="90" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 樱桃会非遗 IP</text>
  <text x="24" y="108" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 紧邻十八洞 5A 红利</text>
