  <!-- O -->
  <rect x="14" y="216" width="240" height="170" rx="6" fill="rgba(55,138,221,0.04)" stroke="rgba(55,138,221,0.2)" stroke-width="1"/>
  <path d="M14 222 Q14 216 20 216 L130 216 L130 232 L14 232 Z" fill="rgba(55,138,221,0.08)"/>
  <text x="130" y="228" font-size="11" font-weight="700" fill="#378ADD" text-anchor="middle">O 机会</text>
  <text x="24" y="250" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 情绪经济·60亿人次风口</text>
  <text x="24" y="268" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 研学旅行市场爆发</text>
  <text x="24" y="286" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 银发旅居万亿市场</text>
  <text x="24" y="304" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 小而美精品化趋势</text>
  <text x="24" y="322" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 小红书+私域获客红利</text>
