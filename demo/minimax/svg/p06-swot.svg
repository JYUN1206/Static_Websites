  <!-- T -->
  <rect x="266" y="216" width="240" height="170" rx="6" fill="rgba(153,53,86,0.04)" stroke="rgba(153,53,86,0.2)" stroke-width="1"/>
  <path d="M266 222 Q266 216 272 216 L382 216 L382 232 L266 232 Z" fill="rgba(153,53,86,0.08)"/>
  <text x="386" y="228" font-size="11" font-weight="700" fill="#993556" text-anchor="middle">T 威胁</text>
  <text x="276" y="250" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 周边竞品同质化严重</text>
  <text x="276" y="268" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 山路安全风险</text>
  <text x="276" y="286" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 村落承载力有限</text>
  <text x="276" y="304" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 十八洞虹吸效应</text>
  <text x="276" y="322" font-size="9" fill="#1a2e1f" opacity="0.65">✦ 经济下行消费降级</text>
